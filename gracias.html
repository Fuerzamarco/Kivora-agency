<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Mensaje recibido! — Kivora Agency</title>
<meta name="robots" content="noindex">
<style>
  :root{--bg:#020817;--blue:#3b82f6;--teal:#06b6d4;--green:#22c55e;--text:#e2e8f0;--muted:#64748b;--glow:rgba(59,130,246,0.4)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
  .card{background:#0d1b35;border:1px solid rgba(59,130,246,0.2);border-radius:24px;padding:48px 40px;max-width:480px;width:100%}
  .icon{font-size:4rem;margin-bottom:20px}
  h1{font-size:1.8rem;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,#fff,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  p{color:var(--muted);font-size:1rem;line-height:1.7;margin-bottom:8px}
  .highlight{color:var(--green);font-weight:700}
  .btn{display:inline-block;margin-top:28px;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;padding:12px 28px;border-radius:10px;font-weight:700;font-size:.95rem;text-decoration:none;box-shadow:0 0 30px var(--glow)}
  .logo{font-size:1.1rem;font-weight:800;margin-top:32px;color:var(--muted)}
  .logo span{color:#60a5fa}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>¡Recibido!</h1>
    <p>Gracias por contactar con <strong>Kivora Agency</strong>.</p>
    <p>Te escribimos en menos de <span class="highlight">24 horas</span> para mostrarte la demo con tu negocio real.</p>
    <p style="margin-top:16px;font-size:.88rem">Mientras tanto, si tienes dudas urgentes escríbenos directamente a:<br><a href="mailto:hdmarco42@gmail.com" style="color:#60a5fa">hdmarco42@gmail.com</a></p>
    <a href="/" class="btn">← Volver a la web</a>
    <div class="logo">Kivora<span>Agency</span></div>
  </div>
</body>
</html>
